<!DOCTYPE html>
<html>
  <head>
   <title>Sign up form</title>
   <style>
    .last-name,
    .first-name{
     margin-right: 5px;
     padding-left: 3px;
     padding-right: 3px;
     padding-top: 5px;
     padding-bottom: 5px;
     font-family: arial;
     font-size: 13px;
     border-radius: 8px;
     border: 2px double #333;;
    }
    
    .email{
     display: block;
     margin-top: 10px;
     padding-right: 175px;
     padding-top:5px;
     padding-bottom: 5px;
     border-radius: 8px;
    }
    .sign-btn{
      margin-top: 10px;
      background-color: rgb(10, 146, 208);
      color: white;
      padding-top: 10px;
      padding-bottom: 10px;
      padding-left: 145px;
      padding-right: 145px;
      border-radius: 8px;
      border:none;
      font-size: 15px;
    }
   </style>
  </head>
  <body>
    <input class="first-name" type="text" placeholder="First Name">
    <input class="last-name" type="text" placeholder="Last Name">
    <input class="email" type="text" placeholder="Email">
    <button class="sign-btn">Sign Up</button>
  </body>
</html>
