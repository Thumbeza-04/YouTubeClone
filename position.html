<!DOCTYPE html>
<html>
  <head>
    <title>Position Practice</title>
  </head>
  <body style="
    height: 2000px;
    padding-top:40px;
    padding-left: 68px;
  ">
    <div style="
      background-color: black;
      color: white;
      position: fixed;
      top:0px;
      left:0px;
      right:0px;
      height: 30px;
      z-index: 100;
      ">Header</div>
    <div style="
    background-color: green;
    color:white;
    position: fixed;
    left:0;
    bottom: 0;
    top: 30px;
    width: 75px;
    
    ">
      SideBar
    </div>

    <div style="
    position: absolute;
    background-color: red;
    color: white;

    ">
      Absolute
    </div>
    <div style="
      background-color: lightblue;
      height: 200px;
      width: 200px;
      ">Div 1</div>
    <div style="
    background-color: lightpink;
    height:200px;
    width:200px;
    ">Div 2</div>
  </body>
</html>
