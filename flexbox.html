<!DOCTYPE html>
  <html>
  <head>
     <title>Flexbox Practice</title>
  </head>
  <body>
    <div style="
      display: flex;
      flex-direction: row;
      ">
      
      <div style="
        background-color: lightblue;
        flex: 1;
        ">div 1</div>
      <div style="
      background-color: pink;
      width: 200px;
      ">div 2</div>
      <div style="
      background-color:lightblue ;
      flex:2;
      ">div 3</div>
    </div>

      <div style="
        margin-top: 20px;
        height: 70px;
        border-width: 1px;
        border-style: solid;
        border-color: gray;
        justify-content: start;

        display: flex;
        flex-direction: row;
        ">
        <div style="
          background-color: lightblue;
          width: 100px;
          ">100px</div>
        <div style="
        background-color: pink;
        width: 100px;
        ">100px</div>
        <div style="
        background-color:lightblue ;
         width: 100px;
        ">100px</div>
      </div>


       <div style="
        margin-top: 20px;
        height: 70px;
        border-width: 1px;
        border-style: solid;
        border-color: gray;
        justify-content: space-between;

        display: flex;
        flex-direction: row;
        ">
        <div style="
          background-color: lightblue;
          width: 100px;
          ">100px</div>
        <div style="
        background-color: pink;
        width: 100px;
        ">100px</div>
        <div style="
        background-color:lightblue ;
         width: 100px;
        ">100px</div>
      </div>

      <div style="
        margin-top: 20px;
        height: 70px;
        border-width: 1px;
        border-style: solid;
        border-color: gray;
        justify-content: space-between;
        align-items: center;

        display: flex;
        flex-direction: row;
        ">
        <div style="
          background-color: lightblue;
          width: 100px;
          ">100px</div>
        <div style="
        background-color: pink;
        width: 100px;
        ">100px</div>
        <div style="
        background-color:lightblue ;
         width: 100px;
        ">100px</div>
      </div>
  </body>

</html>
